version: "3.9"

services:
  xml-feed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saree-xml-feed
    env_file:
      - .env
    ports:
      - "8083:8000"
    volumes:
      - xml_feed_cache:/service/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - lfs_chatbot_v4_titan

volumes:
  xml_feed_cache:

networks:
  lfs_chatbot_v4_titan:
    external: true
